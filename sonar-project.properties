sonar.projectKey=kozzan_betting-frontend
sonar.organization=kozzan

# Exclude fixture/mock files from duplication and coverage analysis
sonar.cpd.exclusions=lib/mocks.ts
sonar.coverage.exclusions=lib/mocks.ts,components/ui/**

# Source and test paths
sonar.sources=.
sonar.exclusions=node_modules/**,coverage/**,public/**,.next/**,**/*.d.ts
sonar.tests=__tests__
sonar.test.inclusions=**/__tests__/**

# Coverage report generated by vitest --coverage (v8 + lcov reporter)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
